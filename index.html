<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiWorldBank | Ultimate Edition</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;}
body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
}
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}
.logo{font-weight:bold;font-size:20px;}
select{
padding:8px 12px;
border-radius:10px;
border:none;
background:#1e2f38;
color:white;
}
.hero{text-align:center;padding:40px 20px;}
.hero h1{font-size:30px;margin-bottom:10px;}
.dex-banner{
margin:20px;
padding:18px;
border-radius:15px;
background:linear-gradient(90deg,#ff8c00,#ff3c00);
text-align:center;
font-weight:bold;
}
.nav{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
padding:20px;
}
.nav button{
padding:14px 6px;
border-radius:30px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;
transition:0.3s;
}
.nav button:hover{
background:rgba(255,255,255,0.25);
transform:translateY(-2px);
}
.card,.section{
margin:25px 20px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
}
.balance-amount{font-size:50px;font-weight:bold;}
input{
padding:10px;
border-radius:8px;
border:none;
margin:5px 0;
width:100%;
}
button.action{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:#00c6ff;
color:black;
font-weight:bold;
cursor:pointer;
}
table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}
td,th{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.2);
font-size:14px;
}
footer{
text-align:center;
padding:40px 15px;
opacity:0.6;
}
.hidden{display:none;}
@media(max-width:700px){
.nav{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

<body>

<header>
<div class="logo">🌍 PiWorldBank</div>
<select id="language">
<option>한국어</option>
<option>English</option>
</select>
</header>

<div class="hero">
<h1>Web3 Digital Bank & DEX Ecosystem</h1>
<p>Liquidity · DEX · UBI · Global Expansion</p>
</div>

<div class="dex-banner">
🚀 3월 12일 자체 DEX 거래소 런칭
</div>

<div class="nav">
<button>결제</button>
<button>송금</button>
<button>예치</button>
<button>리워드</button>
<button>UBI</button>
<button onclick="adminLogin()">관리자</button>
</div>

<div class="card">
<div>총 잔액</div>
<div class="balance-amount" id="balance">400 Pi</div>
</div>

<div class="section">
<h3>DEX 스왑 시뮬레이터</h3>
<input type="number" id="swapAmount" placeholder="Pi 입력">
<button class="action" onclick="simulateSwap()">USDT로 스왑</button>
<div id="swapResult"></div>
</div>

<div class="section">
<h3>유동성 풀 APR 계산기</h3>
<input type="number" id="lpAmount" placeholder="예치 Pi 수량">
<input type="number" id="apr" placeholder="예상 APR (%)">
<button class="action" onclick="calculateAPR()">수익 계산</button>
<div id="aprResult"></div>
</div>

<div class="section">
<h3>거래 내역</h3>
<table>
<thead>
<tr><th>타입</th><th>수량</th><th>시간</th></tr>
</thead>
<tbody id="txTable"></tbody>
</table>
</div>

<div class="section hidden" id="adminPanel">
<h3>관리자 모드</h3>
<button class="action" onclick="mint()">+100 Pi 민트</button>
</div>

<footer>
Contact: info@hkglobal.com<br>
© 2026 PiWorldBank Ultimate Edition
</footer>

<script>
let balance=400;

function simulateSwap(){
let amount=parseFloat(document.getElementById("swapAmount").value);
if(!amount || amount<=0) return;
let rate=35; 
let result=amount*rate;
document.getElementById("swapResult").innerHTML=
amount+" Pi → "+result.toFixed(2)+" USDT (시뮬레이션)";
addTx("SWAP",amount);
}

function calculateAPR(){
let amount=parseFloat(document.getElementById("lpAmount").value);
let apr=parseFloat(document.getElementById("apr").value);
if(!amount||!apr)return;
let yearly=amount*(apr/100);
document.getElementById("aprResult").innerHTML=
"예상 연 수익: "+yearly.toFixed(2)+" Pi";
}

function addTx(type,amount){
let table=document.getElementById("txTable");
let row=table.insertRow(0);
row.insertCell(0).innerText=type;
row.insertCell(1).innerText=amount+" Pi";
row.insertCell(2).innerText=new Date().toLocaleTimeString();
}

function adminLogin(){
let pass=prompt("관리자 비밀번호 입력");
if(pass==="1234"){
document.getElementById("adminPanel").classList.remove("hidden");
}
}

function mint(){
balance+=100;
document.getElementById("balance").innerText=balance+" Pi";
addTx("MINT",100);
}
</script>

</body>
</html>
