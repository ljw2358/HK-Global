<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiWorldBank</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(0,0,0,0.3);
}

select{
padding:5px;
border-radius:6px;
}

.container{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:15px;
margin-top:30px;
}

button{
padding:20px;
border:none;
border-radius:15px;
background:#ffd700;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.section{
display:none;
margin-top:30px;
padding:20px;
background:rgba(255,255,255,0.1);
border-radius:15px;
}

input{
padding:8px;
margin:5px;
border-radius:8px;
border:none;
}
</style>
</head>

<body>

<header>
<h2>🌍 PiWorldBank</h2>
<select id="languageSelect" onchange="changeLanguage()"></select>
</header>

<div class="container">

<h1 id="welcomeText">Welcome to PiWorldBank</h1>

<div class="grid">
<button onclick="showSection('pay')">결재</button>
<button onclick="showSection('send')">송금</button>
<button onclick="showSection('deposit')">예치</button>
<button onclick="showSection('reward')">리워드</button>
<button onclick="showSection('ubi')">UBI</button>
<button onclick="showSection('support')">고객센터</button>
</div>

<!-- 결재 -->
<div id="pay" class="section">
<h3>결재</h3>
<input placeholder="상대 지갑주소">
<input placeholder="금액">
<button onclick="processPayment()">결재 실행</button>
</div>

<!-- 송금 -->
<div id="send" class="section">
<h3>송금</h3>
<input placeholder="받는 주소">
<input placeholder="금액">
<button onclick="processTransfer()">송금 실행</button>
</div>

<!-- 예치 -->
<div id="deposit" class="section">
<h3>예치 (Staking)</h3>
<input placeholder="예치 수량">
<button onclick="processDeposit()">예치 시작</button>
</div>

<!-- 리워드 -->
<div id="reward" class="section">
<h3>리워드 확인</h3>
<button onclick="checkReward()">리워드 조회</button>
<p id="rewardResult"></p>
</div>

<!-- UBI -->
<div id="ubi" class="section">
<h3>UBI 신청</h3>
<button onclick="applyUBI()">UBI 신청하기</button>
</div>

<!-- 고객센터 -->
<div id="support" class="section">
<h3>고객센터</h3>

<div id="userSupport">
<input id="userMessage" placeholder="문의 내용 입력">
<button onclick="submitTicket()">문의 제출</button>
<p id="ticketStatus"></p>
</div>

<hr>

<div id="adminLogin">
<h4>관리자 로그인</h4>
<input id="adminPass" type="password" placeholder="관리자 비밀번호">
<button onclick="adminAccess()">관리자 접속</button>
</div>

<div id="adminPanel" style="display:none;">
<h4>관리자 패널</h4>
<button onclick="viewTickets()">문의 목록 보기</button>
<p id="ticketList"></p>
</div>

</div>

</div>

<script>

/* ================================
   20+ Language System
================================ */
const languages = {
en:"English",ko:"한국어",zh:"中文",ja:"日本語",es:"Español",
fr:"Français",de:"Deutsch",ar:"العربية",ru:"Русский",
hi:"Hindi",pt:"Português",it:"Italiano",tr:"Türkçe",
vi:"Vietnamese",th:"Thai",id:"Indonesian",
pl:"Polski",nl:"Dutch",sv:"Swedish",uk:"Ukrainian",
fa:"Persian"
};

const welcomeTexts = {
en:"Welcome to PiWorldBank",
ko:"파이월드뱅크에 오신 것을 환영합니다",
zh:"欢迎来到 PiWorldBank",
ja:"PiWorldBankへようこそ",
es:"Bienvenido a PiWorldBank",
fr:"Bienvenue à PiWorldBank",
de:"Willkommen bei PiWorldBank",
ar:"مرحبًا بكم في PiWorldBank",
ru:"Добро пожаловать в PiWorldBank",
hi:"PiWorldBank में आपका स्वागत है",
pt:"Bem-vindo ao PiWorldBank",
it:"Benvenuto su PiWorldBank",
tr:"PiWorldBank'e Hoş Geldiniz",
vi:"Chào mừng đến PiWorldBank",
th:"ยินดีต้อนรับสู่ PiWorldBank",
id:"Selamat datang di PiWorldBank",
pl:"Witamy w PiWorldBank",
nl:"Welkom bij PiWorldBank",
sv:"Välkommen till PiWorldBank",
uk:"Ласкаво просимо до PiWorldBank",
fa:"به PiWorldBank خوش آمدید"
};

const select = document.getElementById("languageSelect");
for(let key in languages){
let opt=document.createElement("option");
opt.value=key;
opt.textContent=languages[key];
select.appendChild(opt);
}

function autoDetectLanguage(){
let userLang=navigator.language.substring(0,2);
if(languages[userLang]){
select.value=userLang;
changeLanguage();
}
}

function changeLanguage(){
let lang=select.value;
document.getElementById("welcomeText").innerText=welcomeTexts[lang];
}

autoDetectLanguage();

/* ================================
   Button Functions
================================ */
function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
}

function processPayment(){
alert("결재 처리 완료 (메인넷 연결 자리)");
}

function processTransfer(){
alert("송금 처리 완료 (메인넷 연결 자리)");
}

function processDeposit(){
alert("예치 시작됨");
}

function checkReward(){
document.getElementById("rewardResult").innerText="현재 리워드: 12.5 Pi";
}

function applyUBI(){
alert("UBI 신청 완료");
}

/* ================================
   Customer Support System
================================ */
let tickets=[];

function submitTicket(){
let msg=document.getElementById("userMessage").value;
if(msg.trim()=="") return;
tickets.push(msg);
document.getElementById("ticketStatus").innerText="문의 접수 완료";
document.getElementById("userMessage").value="";
}

function adminAccess(){
let pass=document.getElementById("adminPass").value;
if(pass==="314159"){
document.getElementById("adminPanel").style.display="block";
}else{
alert("비밀번호 오류");
}
}

function viewTickets(){
document.getElementById("ticketList").innerText=tickets.join("\n");
}

/* ================================
   Pi SDK 연결 자리 (메인넷 대비)
================================ */

// 여기서 Pi SDK 로직 연결 가능
// async function connectPi() {
// await Pi.init({ version: "2.0" });
// }

</script>

</body>
</html>
