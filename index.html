<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiWorldBank</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;}
body{
background:linear-gradient(180deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

select{
padding:8px 12px;
border-radius:8px;
border:none;
background:#1e2f38;
color:white;
}

.nav{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:8px;
padding:15px;
}

.nav button{
padding:12px 5px;
border-radius:20px;
border:none;
background:#2c3e50;
color:white;
font-size:13px;
cursor:pointer;
transition:0.3s;
}

.nav button:hover{
background:#3f5c6d;
}

.card{
margin:30px 15px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.balance-title{
font-size:22px;
opacity:0.8;
margin-bottom:15px;
}

.balance-amount{
font-size:48px;
font-weight:bold;
}

.section{
margin:20px 15px;
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.05);
}

footer{
text-align:center;
padding:40px 10px;
font-size:14px;
opacity:0.7;
}

@media(max-width:600px){
.nav{
grid-template-columns:repeat(3,1fr);
}
}
</style>
</head>

<body>

<header>
<h3>🌍 PiWorldBank</h3>

<select id="language" onchange="changeLanguage()">
<option value="ko">한국어</option>
<option value="en">English</option>
<option value="zh">中文</option>
<option value="ja">日本語</option>
<option value="es">Español</option>
<option value="fr">Français</option>
<option value="de">Deutsch</option>
<option value="ru">Русский</option>
<option value="ar">العربية</option>
<option value="hi">हिन्दी</option>
<option value="pt">Português</option>
<option value="it">Italiano</option>
<option value="vi">Tiếng Việt</option>
<option value="th">ไทย</option>
<option value="id">Bahasa</option>
<option value="tr">Türkçe</option>
<option value="nl">Nederlands</option>
<option value="sv">Svenska</option>
<option value="pl">Polski</option>
<option value="uk">Українська</option>
</select>
</header>

<div class="nav">
<button data-key="dashboard">대시보드</button>
<button data-key="pay">결제</button>
<button data-key="send">송금</button>
<button data-key="stake">예치</button>
<button data-key="reward">리워드</button>
<button data-key="ubi">UBI</button>
<button data-key="liquidity">유동성풀</button>
<button data-key="media">미디어</button>
<button data-key="support">고객센터</button>
</div>

<div class="card">
<div class="balance-title" data-key="total">총 잔액</div>
<div class="balance-amount">400 Pi</div>
</div>

<div class="section">
<h4 data-key="news">📢 공지사항</h4>
<p data-key="welcome">PiWorldBank에 오신 것을 환영합니다.</p>
</div>

<footer>
Contact: info@hkglobal.com<br>
© 2026 PiWorldBank
</footer>

<script>
const translations={
ko:{
dashboard:"대시보드",
pay:"결제",
send:"송금",
stake:"예치",
reward:"리워드",
ubi:"UBI",
liquidity:"유동성풀",
media:"미디어",
support:"고객센터",
total:"총 잔액",
news:"공지사항",
welcome:"PiWorldBank에 오신 것을 환영합니다."
},
en:{
dashboard:"Dashboard",
pay:"Pay",
send:"Send",
stake:"Deposit",
reward:"Reward",
ubi:"UBI",
liquidity:"Liquidity Pool",
media:"Media",
support:"Support",
total:"Total Balance",
news:"Notice",
welcome:"Welcome to PiWorldBank."
}
};

function changeLanguage(){
const lang=document.getElementById("language").value;
const elements=document.querySelectorAll("[data-key]");
elements.forEach(el=>{
const key=el.getAttribute("data-key");
if(translations[lang] && translations[lang][key]){
el.innerText=translations[lang][key];
}
});
}

// 자동 브라우저 언어 감지
window.onload=function(){
const browserLang=navigator.language.substring(0,2);
if(translations[browserLang]){
document.getElementById("language").value=browserLang;
changeLanguage();
}
}
</script>

</body>
</html>
