<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiWorldBank</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
padding:20px;
text-align:center;
background:#111;
font-size:24px;
font-weight:bold;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
background:#1c1c1c;
}

nav button{
margin:5px;
padding:8px 12px;
border:none;
border-radius:20px;
cursor:pointer;
background:#333;
color:white;
font-size:12px;
}

nav button:hover{
background:#00c6ff;
color:black;
}

.section{
display:none;
padding:20px;
}

.active{
display:block;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
margin:15px 0;
border-radius:15px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:none;
}

.action-btn{
padding:10px;
background:#00c6ff;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
margin-top:10px;
}

.lang-select{
position:absolute;
top:20px;
right:20px;
}

footer{
text-align:center;
padding:20px;
opacity:0.7;
font-size:14px;
}
</style>

<script>
const translations={
en:{dashboard:"Dashboard",payment:"Payment",transfer:"Transfer",vault:"Vault",reward:"Reward",liquidity:"Liquidity Pool",media:"Media",support:"Support",balance:"Total Balance",contact:"Contact"},

zh:{dashboard:"仪表盘",payment:"支付",transfer:"转账",vault:"存款",reward:"奖励",liquidity:"流动池",media:"媒体",support:"客服",balance:"总余额",contact:"联系"},
ja:{dashboard:"ダッシュボード",payment:"支払い",transfer:"送金",vault:"預金",reward:"報酬",liquidity:"流動性プール",media:"メディア",support:"サポート",balance:"総残高",contact:"連絡"},
ar:{dashboard:"لوحة التحكم",payment:"دفع",transfer:"تحويل",vault:"إيداع",reward:"مكافأة",liquidity:"مجمع السيولة",media:"إعلام",support:"الدعم",balance:"الرصيد الإجمالي",contact:"اتصال"},
es:{dashboard:"Panel",payment:"Pago",transfer:"Transferencia",vault:"Depósito",reward:"Recompensa",liquidity:"Liquidez",media:"Medios",support:"Soporte",balance:"Saldo Total",contact:"Contacto"},
fr:{dashboard:"Tableau",payment:"Paiement",transfer:"Transfert",vault:"Dépôt",reward:"Récompense",liquidity:"Liquidité",media:"Média",support:"Support",balance:"Solde Total",contact:"Contact"},
de:{dashboard:"Dashboard",payment:"Zahlung",transfer:"Überweisung",vault:"Einlage",reward:"Belohnung",liquidity:"Liquidität",media:"Medien",support:"Support",balance:"Gesamtguthaben",contact:"Kontakt"},
ru:{dashboard:"Панель",payment:"Платеж",transfer:"Перевод",vault:"Вклад",reward:"Награда",liquidity:"Ликвидность",media:"Медиа",support:"Поддержка",balance:"Общий баланс",contact:"Контакт"},
pt:{dashboard:"Painel",payment:"Pagamento",transfer:"Transferência",vault:"Depósito",reward:"Recompensa",liquidity:"Liquidez",media:"Mídia",support:"Suporte",balance:"Saldo Total",contact:"Contato"},
it:{dashboard:"Pannello",payment:"Pagamento",transfer:"Trasferimento",vault:"Deposito",reward:"Ricompensa",liquidity:"Liquidità",media:"Media",support:"Supporto",balance:"Saldo Totale",contact:"Contatto"},
hi:{dashboard:"डैशबोर्ड",payment:"भुगतान",transfer:"ट्रांसफर",vault:"जमा",reward:"इनाम",liquidity:"लिक्विडिटी",media:"मीडिया",support:"सहायता",balance:"कुल बैलेंस",contact:"संपर्क"},
tr:{dashboard:"Panel",payment:"Ödeme",transfer:"Transfer",vault:"Mevduat",reward:"Ödül",liquidity:"Likidite",media:"Medya",support:"Destek",balance:"Toplam Bakiye",contact:"İletişim"},
vi:{dashboard:"Bảng điều khiển",payment:"Thanh toán",transfer:"Chuyển tiền",vault:"Gửi tiền",reward:"Thưởng",liquidity:"Thanh khoản",media:"Truyền thông",support:"Hỗ trợ",balance:"Tổng số dư",contact:"Liên hệ"},
th:{dashboard:"แดชบอร์ด",payment:"ชำระเงิน",transfer:"โอนเงิน",vault:"ฝากเงิน",reward:"รางวัล",liquidity:"สภาพคล่อง",media:"สื่อ",support:"ฝ่ายช่วยเหลือ",balance:"ยอดรวม",contact:"ติดต่อ"},
id:{dashboard:"Dasbor",payment:"Pembayaran",transfer:"Transfer",vault:"Deposito",reward:"Hadiah",liquidity:"Likuiditas",media:"Media",support:"Dukungan",balance:"Saldo Total",contact:"Kontak"},
nl:{dashboard:"Dashboard",payment:"Betaling",transfer:"Overboeking",vault:"Storting",reward:"Beloning",liquidity:"Liquiditeit",media:"Media",support:"Ondersteuning",balance:"Totaal Saldo",contact:"Contact"},
pl:{dashboard:"Panel",payment:"Płatność",transfer:"Transfer",vault:"Depozyt",reward:"Nagroda",liquidity:"Płynność",media:"Media",support:"Wsparcie",balance:"Saldo Całkowite",contact:"Kontakt"},
sv:{dashboard:"Instrumentpanel",payment:"Betalning",transfer:"Överföring",vault:"Insättning",reward:"Belöning",liquidity:"Likviditet",media:"Media",support:"Support",balance:"Totalt Saldo",contact:"Kontakt"},
he:{dashboard:"לוח בקרה",payment:"תשלום",transfer:"העברה",vault:"הפקדה",reward:"תגמול",liquidity:"נזילות",media:"מדיה",support:"תמיכה",balance:"יתרה כוללת",contact:"צור קשר"}
};

function setLanguage(lang){
if(!translations[lang]) lang="en";
document.getElementById("nav-dashboard").innerText=translations[lang].dashboard;
document.getElementById("nav-payment").innerText=translations[lang].payment;
document.getElementById("nav-transfer").innerText=translations[lang].transfer;
document.getElementById("nav-vault").innerText=translations[lang].vault;
document.getElementById("nav-reward").innerText=translations[lang].reward;
document.getElementById("nav-liquidity").innerText=translations[lang].liquidity;
document.getElementById("nav-media").innerText=translations[lang].media;
document.getElementById("nav-support").innerText=translations[lang].support;
document.getElementById("balance-title").innerText=translations[lang].balance;
document.getElementById("contact-title").innerText=translations[lang].contact;
}

function autoDetect(){
let lang=navigator.language.slice(0,2);
setLanguage(lang);
}

function showSection(id){
let sections=document.getElementsByClassName("section");
for(let i=0;i<sections.length;i++){
sections[i].classList.remove("active");
}
document.getElementById(id).classList.add("active");
}

window.onload=autoDetect;
</script>

</head>
<body>

<header>
🌍 PiWorldBank
<select class="lang-select" onchange="setLanguage(this.value)">
<option value="en">EN</option>
<option value="ko">KO</option>
<option value="zh">ZH</option>
<option value="ja">JA</option>
<option value="ar">AR</option>
<option value="es">ES</option>
<option value="fr">FR</option>
<option value="de">DE</option>
<option value="ru">RU</option>
<option value="pt">PT</option>
<option value="it">IT</option>
<option value="hi">HI</option>
<option value="tr">TR</option>
<option value="vi">VI</option>
<option value="th">TH</option>
<option value="id">ID</option>
<option value="nl">NL</option>
<option value="pl">PL</option>
<option value="sv">SV</option>
<option value="he">HE</option>
</select>
</header>

<nav>
<button id="nav-dashboard" onclick="showSection('dashboard')">Dashboard</button>
<button id="nav-payment" onclick="showSection('payment')">Payment</button>
<button id="nav-transfer" onclick="showSection('transfer')">Transfer</button>
<button id="nav-vault" onclick="showSection('vault')">Vault</button>
<button id="nav-reward" onclick="showSection('reward')">Reward</button>
<button id="nav-liquidity" onclick="showSection('liquidity')">Liquidity</button>
<button id="nav-media" onclick="showSection('media')">Media</button>
<button id="nav-support" onclick="showSection('support')">Support</button>
</nav>

<div id="dashboard" class="section active">
<div class="card">
<h2 id="balance-title">Total Balance</h2>
<h1>400 Pi</h1>
</div>
</div>

<div id="payment" class="section">
<div class="card">
<input type="number" placeholder="Amount (Pi)">
<button class="action-btn">Pay</button>
</div>
</div>

<div id="transfer" class="section">
<div class="card">
<input type="text" placeholder="Receiver">
<input type="number" placeholder="Amount (Pi)">
<button class="action-btn">Send</button>
</div>
</div>

<div id="vault" class="section">
<div class="card">
<select>
<option>30 Days</option>
<option>90 Days</option>
<option>180 Days</option>
</select>
<input type="number" placeholder="Amount (Pi)">
<button class="action-btn">Deposit</button>
</div>
</div>

<div id="reward" class="section">
<div class="card">
<button class="action-btn">Check-in Reward</button>
</div>
</div>

<div id="liquidity" class="section">
<div class="card">
<input type="number" placeholder="Amount (Pi)">
<button class="action-btn">Join Pool</button>
</div>
</div>

<div id="media" class="section">
<div class="card">
<a href="https://youtube.com" target="_blank">YouTube</a><br><br>
<a href="https://tiktok.com" target="_blank">TikTok</a>
</div>
</div>

<div id="support" class="section">
<div class="card">
<h3 id="contact-title">Contact</h3>
<input type="text" placeholder="Email">
<input type="text" placeholder="Message">
<button class="action-btn">Submit</button>
</div>
</div>

<footer>
Contact: info@hkglobal.com<br>
© 2026 PiWorldBank
</footer>

</body>
</html>
