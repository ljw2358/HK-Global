<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiWorldBank - 혜공 형님 에디션</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 400px; margin-top: 20px; }
        .nav-button { background-color: #334155; border: none; color: white; padding: 20px 10px; border-radius: 12px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        .nav-button:active { background-color: #475569; transform: scale(0.98); }
        .cs-button { background-color: #1e293b; border: 1px solid #475569; } /* 고객센터 강조 */
        .info-box { background-color: #1e293b; width: 100%; max-width: 400px; border-radius: 20px; padding: 30px 20px; margin-top: 20px; box-sizing: border-box; }
        .total-balance { font-size: 14px; color: #94a3b8; }
        .amount { font-size: 48px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>PiWorldBank</h2>

    <div class="grid-container">
        <button class="nav-button" onclick="alert('결제 시스템 준비 중')">결제</button>
        <button class="nav-button" onclick="alert('송금 시스템 준비 중')">송금</button>
        <button class="nav-button" onclick="alert('예치 시스템 준비 중')">예치</button>
        <button class="nav-button" onclick="alert('리워드 확인 중')">리워드</button>
        <button class="nav-button" onclick="alert('UBI 정보 로딩 중')">UBI</button>
        <button class="nav-button cs-button" onclick="openCS()">고객센터</button>
    </div>

    <div class="info-box">
        <div class="total-balance">총 잔액</div>
        <div class="amount">400 Pi</div>
    </div>

    <script>
        // 20개국 언어 지원 메시지 (대표 20개국)
        const csMessages = {
            "KO": "고객센터에 연결 중입니다.",
            "EN": "Connecting to Customer Support.",
            "JA": "カスタマーサポートに接続中です。",
            "ZH": "正在连接客服中心。",
            "ES": "Conectando con el centro de atención al cliente.",
            "FR": "Connexion au service client.",
            "DE": "Verbindung zum Kundenservice wird hergestellt.",
            "PT": "Conectando ao suporte ao cliente.",
            "RU": "Подключение к службе поддержки.",
            "VI": "Đang kết nối với trung tâm khách hàng.",
            "TH": "กำลังเชื่อมต่อกับศูนย์บริการ 고객센터",
            "ID": "Menghubungkan ke pusat layanan pelanggan.",
            "AR": "جارٍ الاتصال بمركز خدمة العملاء.",
            "HI": "ग्राहक सेवा केंद्र से जुड़ रहा है।",
            "IT": "Connessione al centro assistenza.",
            "TR": "Müşteri hizmetlerine bağlanılıyor.",
            "NL": "Verbinden met de klantenservice.",
            "PL": "Łączenie z centrum obsługi klienta.",
            "SV": "Ansluter till kundtjänst.",
            "MS": "Menyambung ke pusat khidmat pelanggan."
        };

        function openCS() {
            // 현재 설정된 언어(기본 한국어)에 맞춰 알림창 띄우기 (활성화)
            const lang = "KO"; 
            alert(csMessages[lang] + "\n(20 Global Languages Ready)");
        }
    </script>
</body>
</html>
